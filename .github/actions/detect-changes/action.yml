name: Detect changes
description: "Returns `matched=true` when any file changed between the event's base and head SHAs matches the supplied regex. Caller must run `actions/checkout` with `fetch-depth: 0`. Falls back to `matched=true` when the base SHA is missing or unreachable."

inputs:
  pattern:
    description: 'Extended regex (`grep -E`) matched against changed file paths.'
    required: true

outputs:
  matched:
    description: '`true` if any changed file matched the pattern, `false` otherwise.'
    value: ${{ steps.changes.outputs.matched }}

runs:
  using: composite
  steps:
    - id: changes
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        PATTERN: ${{ inputs.pattern }}
      run: |
        set -euo pipefail

        if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
          echo "matched=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
          echo "Base commit ${BASE_SHA} unreachable; falling back to matched=true."
          echo "matched=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -qE "${PATTERN}"; then
          echo "matched=true" >> "$GITHUB_OUTPUT"
        else
          echo "matched=false" >> "$GITHUB_OUTPUT"
        fi
