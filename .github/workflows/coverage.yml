name: Coverage

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .config/nextest.toml
      - codecov.yml
      - .github/workflows/coverage.yml

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  coverage:
    permissions:
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 #v1.16.0
        with:
          toolchain: stable
          components: llvm-tools-preview
          cache-on-failure: true
      - uses: taiki-e/install-action@0c7a94999971db56e9df89df226240aab222e776 #v2.75.14
        with:
          tool: cargo-llvm-cov,nextest
      - uses: ./.github/actions/setup-zebra-build
      - name: Run coverage tests
        run: |
          cargo llvm-cov --no-report nextest
          # TODO: Do we need --locked --release --features "default-release-binaries" here?
          cargo llvm-cov report --lcov --output-path lcov.info
        env:
          TEST_LARGE_CHECKPOINTS: 1
          # We set cases to 1, because some tests already run 1 case by default.
          # We set maximum shrink iterations to 0, because we don't expect failures in coverage tests.
          # Coverage tests are much slower than other tests, particularly in hot loops.
          PROPTEST_CASES: 1
          PROPTEST_MAX_SHRINK_ITERS: 0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6.0.0
        with:
          files: lcov.info

  coverage-success:
    name: coverage success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - coverage
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
