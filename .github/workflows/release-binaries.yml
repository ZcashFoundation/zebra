# This workflow builds and publishes zebrad release assets and Docker images
# when a release is published.
name: Release binaries

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish assets to (for example v2.6.0)"
        required: false
        type: string
      publish_assets_to_release:
        description: "Upload zebrad assets to the GitHub release tag"
        required: false
        type: boolean
        default: false
      publish_docker_to_dockerhub:
        description: "Publish Docker images to Docker Hub"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            release_tag="$EVENT_RELEASE_TAG"
            checkout_ref="$EVENT_RELEASE_TAG"
          elif [ "$REF_TYPE" = "tag" ]; then
            release_tag="$REF_NAME"
            checkout_ref="$REF_NAME"
          else
            release_tag="$INPUT_RELEASE_TAG"
            checkout_ref="$GITHUB_SHA"
          fi

          if [ -z "$release_tag" ]; then
            echo "A release tag is required. Set workflow_dispatch input release_tag." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

  resolve-zcashd-compat-manifest:
    name: Resolve zcashd compat manifest
    runs-on: ubuntu-latest
    needs: [resolve-release]
    outputs:
      manifest_path: ${{ steps.resolve.outputs.manifest_path }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Resolve and parse manifest
        id: resolve
        run: |
          set -euo pipefail
          ./scripts/resolve-zcashd-compat-manifest.sh \
            --write-github-output \
            --require-targets x86_64-pc-linux-gnu

  build-zebrad-assets:
    name: Build zebrad assets (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: [resolve-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            target_triple: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}
            platform: linux/arm64
            target_triple: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Build release binary
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
        run: |
          set -euo pipefail
          mkdir -p ./out
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target release \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --output "type=local,dest=./out" \
            .
          test -x ./out/usr/local/bin/zebrad

      - name: Validate binary
        run: ./out/usr/local/bin/zebrad --version

      - name: Package archive and metadata
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/bin ./artifacts/metadata
          cp ./out/usr/local/bin/zebrad ./artifacts/bin/zebrad
          archive_name="zebrad-${RELEASE_TAG}-${{ matrix.name }}.tar.gz"
          (
            cd ./artifacts
            tar --sort=name \
              --mtime='UTC 2020-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf "$archive_name" ./bin/zebrad
          )
          archive_sha256="$(sha256sum "./artifacts/${archive_name}" | awk '{print $1}')"
          archive_size="$(stat --printf='%s' "./artifacts/${archive_name}")"
          cat > "./artifacts/metadata/${{ matrix.name }}.metadata.json" <<EOF
          {
            "platform_id": "${{ matrix.name }}",
            "target_triple": "${{ matrix.target_triple }}",
            "archive": "${archive_name}",
            "sha256": "${archive_sha256}",
            "size": ${archive_size},
            "archive_member_binary_path": "./bin/zebrad"
          }
          EOF

      - name: Upload matrix artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zebrad-assets-${{ matrix.name }}
          path: ./artifacts

  publish-zebrad-assets:
    name: Publish zebrad assets
    needs: [resolve-release, build-zebrad-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_assets_to_release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ./publish
          pattern: zebrad-assets-*
          merge-multiple: true

      - name: Build manifest and checksums
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./publish/final
          RELEASE_TAG="$RELEASE_TAG" REPOSITORY="$REPOSITORY" python3 - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          repository = os.environ["REPOSITORY"]
          base_url = f"https://github.com/{repository}/releases/download/{release_tag}"
          metadata_files = sorted(glob.glob("./publish/**/*.metadata.json", recursive=True))
          if not metadata_files:
              raise SystemExit("No metadata files found.")

          artifacts = []
          for file_path in metadata_files:
              item = json.loads(Path(file_path).read_text(encoding="utf-8"))
              item["url"] = f"{base_url}/{item['archive']}"
              artifacts.append(item)

          manifest = {
              "schema_version": 1,
              "release_tag": release_tag,
              "repository": repository,
              "artifacts": artifacts,
          }
          Path("./publish/final").mkdir(parents=True, exist_ok=True)
          Path(f"./publish/final/zebrad-manifest-{release_tag}.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          find ./publish -type f -name 'zebrad-*.tar.gz' -exec cp {} ./publish/final/ \;
          cp ./scripts/install-zcashd-compat.sh ./publish/final/
          cp ./scripts/install-zakura.sh ./publish/final/
          RELEASE_TAG="$RELEASE_TAG" python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          image_version = release_tag.removeprefix("v")
          installers = {
              "install-zcashd-compat.sh": {
                  "ZEBRA_RELEASE_TAG": release_tag,
                  "ZEBRA_DOCKER_IMAGE": f"valaroman/zebra:{image_version}",
                  "ZEBRA_COMPAT_DOCKER_IMAGE": f"valaroman/zebra:zcashd-compat-{image_version}",
              },
              "install-zakura.sh": {
                  "ZEBRA_RELEASE_TAG": release_tag,
                  "ZEBRA_DOCKER_IMAGE": f"valaroman/zebra:{image_version}",
              },
          }
          for filename, replacements in installers.items():
              installer_path = Path("./publish/final") / filename
              installer = installer_path.read_text(encoding="utf-8")
              for name, value in replacements.items():
                  installer, count = re.subn(
                      rf'^{name}="[^"]*"$',
                      f'{name}="{value}"',
                      installer,
                      count=1,
                      flags=re.MULTILINE,
                  )
                  if count != 1:
                      raise SystemExit(f"Expected exactly one {name} assignment in {filename}.")
              installer_path.write_text(installer, encoding="utf-8")
          PY
          (
            cd ./publish/final
            rm -f SHA256SUMS.txt
            sha256sum ./* > ../SHA256SUMS.txt
            mv ../SHA256SUMS.txt SHA256SUMS.txt
          )

      - name: Ensure release exists
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          TARGET_REF: ${{ needs.resolve-release.outputs.checkout_ref }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi

          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$REF_TYPE" != "tag" ]; then
            echo "Release $RELEASE_TAG does not exist." >&2
            exit 1
          fi

          release_flags=()
          release_notes="Release created by release-binaries."
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_flags+=(--draft --prerelease)
            release_notes="Temporary release created by release-binaries workflow_dispatch."
          elif [[ "$RELEASE_TAG" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          target_commitish="$(git rev-parse --verify "${TARGET_REF}^{commit}")"
          gh release create "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --target "$target_commitish" \
            --title "$RELEASE_TAG" \
            --notes "$release_notes" \
            "${release_flags[@]}"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            ./publish/final/zebrad-*.tar.gz \
            ./publish/final/zebrad-manifest-*.json \
            ./publish/final/install-zcashd-compat.sh \
            ./publish/final/install-zakura.sh \
            ./publish/final/SHA256SUMS.txt \
            --repo "$REPOSITORY" \
            --clobber

  build:
    name: Build Release Docker (${{ matrix.name }})
    needs: [resolve-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            docker_tag_suffix: amd64
          - name: linux-aarch64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}
            platform: linux/arm64
            docker_tag_suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Login to DockerHub
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build runtime image
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          IMAGE_TAG: valaroman/zebra:release-ci-${{ matrix.name }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "$IMAGE_TAG" \
            --load \
            .
          docker image inspect "$IMAGE_TAG" >/dev/null

      - name: Build and push runtime image
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          DOCKER_TAG_SUFFIX: ${{ matrix.docker_tag_suffix }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "valaroman/zebra:${image_version}-${DOCKER_TAG_SUFFIX}" \
            --push \
            .

  publish-docker-manifest:
    name: Publish Docker multi-arch manifest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
    runs-on: ubuntu-latest
    needs: [resolve-release, build]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Create and verify Docker manifest
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          tags=(-t "valaroman/zebra:${image_version}")
          if [ "$EVENT_NAME" = "release" ]; then
            tags+=(-t "valaroman/zebra:latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "valaroman/zebra:${image_version}-amd64" \
            "valaroman/zebra:${image_version}-arm64"

          docker buildx imagetools inspect "valaroman/zebra:${image_version}" \
            --format '{{json .Manifest}}' \
            | jq -e '
                [ .manifests[].platform | "\(.os)/\(.architecture)" ] as $platforms
                | ($platforms | index("linux/amd64")) != null and ($platforms | index("linux/arm64")) != null
              ' >/dev/null

  build-zcashd-compat:
    name: Build Release Docker zcashd Compat (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: [resolve-release, resolve-zcashd-compat-manifest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            docker_tag_suffix: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Login to DockerHub
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare zcashd compat build context
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          ./scripts/resolve-zcashd-compat-manifest.sh \
            --prepare-build-context "${RUNNER_TEMP}/zcashd-compat-context" \
            --platform "$DOCKER_PLATFORM"

      - name: Build zcashd compat runtime image
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          IMAGE_TAG: valaroman/zebra:zcashd-compat-release-ci-${{ matrix.name }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime-zcashd-compat \
            --file ./docker/Dockerfile \
            --build-context "zcashd_compat=${RUNNER_TEMP}/zcashd-compat-context" \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "$IMAGE_TAG" \
            --load \
            .
          docker image inspect "$IMAGE_TAG" >/dev/null

      - name: Build and push zcashd compat runtime image
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          DOCKER_TAG_SUFFIX: ${{ matrix.docker_tag_suffix }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime-zcashd-compat \
            --file ./docker/Dockerfile \
            --build-context "zcashd_compat=${RUNNER_TEMP}/zcashd-compat-context" \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "valaroman/zebra:zcashd-compat-${image_version}-${DOCKER_TAG_SUFFIX}" \
            --push \
            .

  publish-zcashd-compat-docker-manifest:
    name: Publish zcashd compat Docker amd64 manifest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
    runs-on: ubuntu-latest
    needs: [resolve-release, resolve-zcashd-compat-manifest, build-zcashd-compat]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Create and verify zcashd compat Docker manifest
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          tags=(-t "valaroman/zebra:zcashd-compat-${image_version}")
          if [ "$EVENT_NAME" = "release" ]; then
            tags+=(-t "valaroman/zebra:zcashd-compat-latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "valaroman/zebra:zcashd-compat-${image_version}-amd64"

          docker buildx imagetools inspect "valaroman/zebra:zcashd-compat-${image_version}" \
            --format '{{json .Manifest}}' \
            | jq -e '
                [ .manifests[].platform | "\(.os)/\(.architecture)" ] as $platforms
                | $platforms == ["linux/amd64"]
              ' >/dev/null

  release-binaries-success:
    name: Release binaries success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - resolve-release
      - resolve-zcashd-compat-manifest
      - build-zebrad-assets
      - publish-zebrad-assets
      - build
      - publish-docker-manifest
      - build-zcashd-compat
      - publish-zcashd-compat-docker-manifest
    timeout-minutes: 1
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: publish-zebrad-assets,publish-docker-manifest
