name: Unit Tests

on:
  pull_request:
    branches: [main, ironwood-main, evan/ironwood-qol, feat/p2p-v2]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .config/nextest.toml
      - .github/workflows/tests-unit.yml
      - docker/docker-compose.zakura-regtest-e2e.yml
      - docker/zakura-regtest-e2e/**

  push:
    branches: [main, ironwood-main, evan/ironwood-qol, feat/p2p-v2]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .config/nextest.toml
      - .github/workflows/tests-unit.yml
      - docker/docker-compose.zakura-regtest-e2e.yml
      - docker/zakura-regtest-e2e/**

  # Run the full unit-test suite when a PR is queued so the merge queue validates
  # the merged result against the latest `main`. `merge_group` ignores path
  # filters, so this runs unconditionally on every queued entry.
  merge_group:

  schedule:
    # Keep release-mode coverage off the critical PR path.
    - cron: "0 8 * * *"

  workflow_dispatch:

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  unit-tests:
    name: ${{ matrix.rust-version }} on ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust-version: [stable]
        features: [default-release-binaries]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: ${{ matrix.rust-version }}
          cache-key: unit-tests-${{ matrix.os }}-${{ matrix.rust-version }}-${{ matrix.features }}-${{ (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'A-release')) && 'debug' || 'release' }}
          cache-on-failure: true
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 #v2.79.3
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zebra-build

      - name: Run unit tests
        run: |
          if [[ "${RELEASE_TESTS}" == "true" ]]; then
            cargo nextest run --profile all-tests --locked --release --features "${{ matrix.features }}" --run-ignored=all
          else
            cargo nextest run --profile all-tests --locked --features "${{ matrix.features }}" --run-ignored=all
          fi
        env:
          RELEASE_TESTS: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'A-release') }}
          TEST_LARGE_CHECKPOINTS: 1

  check-no-git-dependencies:
    name: Check no git dependencies
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: contains(github.event.pull_request.labels.*.name, 'A-release')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: stable
          cache-on-failure: true
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 #v2.79.3
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zebra-build
      - name: Check no git dependencies
        run: cargo nextest run --profile check-no-git-dependencies --locked --run-ignored=only

  zakura-regtest-e2e-pr-gate:
    name: Zakura regtest e2e (pr-gate)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: stable
          cache-key: zakura-regtest-e2e-pr-gate
          cache-on-failure: true
      - uses: ./.github/actions/setup-zebra-build
      - name: Build zebrad (debug)
        # The e2e bind-mounts this binary into a stock `debian:trixie-slim`
        # container that has no RocksDB installed. `setup-zebra-build` exports
        # `ROCKSDB_LIB_DIR`, which makes librocksdb-sys dynamically link the
        # runner's `librocksdb.so`; that library is absent in the container, so
        # every node crashes with "librocksdb.so.8.9: cannot open shared object
        # file". Unset it here so RocksDB is vendored and statically linked,
        # yielding a self-contained binary the slim image can run.
        run: |
          unset ROCKSDB_LIB_DIR
          cargo build -p zebrad --bin zebrad
        env:
          CXXFLAGS: "-include cstdint"
      - name: Run Zakura regtest PR gate
        # `cargo test --test zakura_regtest_e2e` compiles the zebrad bin (cargo
        # always builds a package's binaries so its integration tests can find
        # them), and the harness bind-mounts that bin into a stock
        # `debian:trixie-slim` container with no system RocksDB. With
        # `ROCKSDB_LIB_DIR` set (by `setup-zebra-build`) that compile relinks the
        # bin against the runner's librocksdb.so, overwriting the statically
        # linked binary from the build step above, so every node crashes with
        # "librocksdb.so.8.9: cannot open shared object file". Unset it here so
        # the bin compiled by this step stays vendored and statically linked.
        run: |
          unset ROCKSDB_LIB_DIR
          cargo test -p zebrad --test zakura_regtest_e2e -- --ignored --nocapture
        env:
          CXXFLAGS: "-include cstdint"
          ZAKURA_REGTEST_E2E: "1"
          ZAKURA_E2E_MODE: pr-gate
          ZAKURA_E2E_TRACE_DIR: ${{ runner.temp }}/zakura-regtest-e2e-traces-pr-gate
          ZAKURA_REGTEST_E2E_LABEL: zakura-pr-gate
      - name: Upload Zakura e2e traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakura-regtest-e2e-pr-gate
          path: ${{ runner.temp }}/zakura-regtest-e2e-traces-pr-gate
          if-no-files-found: ignore

  zakura-regtest-e2e:
    name: Zakura regtest e2e (${{ matrix.zakura-mode }})
    # The long four-node docker stack runs only on the nightly schedule and on
    # demand. PRs and merge queue use the trimmed pr-gate job above.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        zakura-mode:
          - checkpoint-long
          - no-checkpoint-long
          - restart-matrix
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: stable
          cache-key: zakura-regtest-e2e
          cache-on-failure: true
      - uses: ./.github/actions/setup-zebra-build
      # The e2e drives a host-networked docker-compose stack of four nodes running
      # the host-built debug zebrad binary; ubuntu-latest runners ship Docker and
      # Compose, so no extra setup is needed. Build the binary up front so a compile
      # failure surfaces clearly and separately from the e2e run.
      - name: Build zebrad (debug)
        # Unset `ROCKSDB_LIB_DIR` (exported by `setup-zebra-build`) so RocksDB is
        # vendored and statically linked. The resulting self-contained binary is
        # bind-mounted into a stock `debian:trixie-slim` container that has no
        # system RocksDB; dynamically linking it crashes every node with
        # "librocksdb.so.8.9: cannot open shared object file".
        run: |
          unset ROCKSDB_LIB_DIR
          cargo build -p zebrad --bin zebrad
        env:
          CXXFLAGS: "-include cstdint"
      - name: Run Zakura regtest dual-stack e2e
        # The test is `#[ignore]` and additionally returns early in CI unless
        # `ZAKURA_REGTEST_E2E=1` is set, so both flags are required to force it.
        # Unset `ROCKSDB_LIB_DIR` so the zebrad bin that `cargo test` compiles for
        # the integration test stays statically linked — otherwise it relinks
        # against the runner's librocksdb.so and crashes in the slim container
        # (see the PR-gate step above for the full explanation).
        run: |
          unset ROCKSDB_LIB_DIR
          cargo test -p zebrad --test zakura_regtest_e2e -- --ignored --nocapture
        env:
          CXXFLAGS: "-include cstdint"
          ZAKURA_REGTEST_E2E: "1"
          ZAKURA_E2E_MODE: ${{ matrix.zakura-mode }}
          ZAKURA_E2E_TRACE_DIR: ${{ runner.temp }}/zakura-regtest-e2e-traces-${{ matrix.zakura-mode }}
          ZAKURA_REGTEST_E2E_LABEL: zakura-${{ matrix.zakura-mode }}
      - name: Upload Zakura e2e traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakura-regtest-e2e-${{ matrix.zakura-mode }}
          path: ${{ runner.temp }}/zakura-regtest-e2e-traces-${{ matrix.zakura-mode }}
          if-no-files-found: ignore

  test-success:
    name: test success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - unit-tests
      - check-no-git-dependencies
      - zakura-regtest-e2e-pr-gate
      - zakura-regtest-e2e
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          # The release-only dependency check and mode-specific e2e lanes are
          # skipped outside their event scopes. Failed, non-skipped jobs still
          # fail this aggregate status.
          allowed-skips: check-no-git-dependencies, zakura-regtest-e2e-pr-gate, zakura-regtest-e2e
